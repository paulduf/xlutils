repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: ty
        name: ty typecheck
        entry: uv run ty check src/
        language: system
        pass_filenames: false
        types: [python]
